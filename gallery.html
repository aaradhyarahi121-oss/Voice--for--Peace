<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery - Voice for Peace</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Nunito', sans-serif;
            text-align: center;
            background-color: #f4f8fb;
        }

        .main-heading {
            font-size: 50px;
            color: #4f6d7a;
            margin-top: 20px;
        }

        .sub-heading {
            color: #6f8f9b;
            margin-bottom: 30px;
        }

        .gallery-container {
            width: 85%;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .gallery-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            transition: 0.3s;
        }

        .gallery-img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1 class="main-heading">Gallery</h1>
    <p class="sub-heading">Moments of Peace & Harmony</p>

    <div class="gallery-container">

        <!-- p images -->
        <img src="p1.jpg" class="gallery-img">
        <img src="p2.png" class="gallery-img">
        <img src="p3.jpg" class="gallery-img">
        <img src="p4.jpg" class="gallery-img">
        <img src="p5.jpg" class="gallery-img">
        <img src="p6.jpg" class="gallery-img">

        <!-- numbered images -->

        <img src="848.jpg" class="gallery-img">
        <img src="78788.jpg" class="gallery-img">

        <img src="798799.jpg" class="gallery-img">
        <img src="6767676767.jpg" class="gallery-img">
        <img src="8679789780.jpg" class="gallery-img">

    </div>

</html>
